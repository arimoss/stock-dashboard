<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>株式ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#080b12;color:#dde1f0;min-height:100vh}
:root{
  --bg0:#080b12;--bg1:#0d1120;--bg2:#131828;--bg3:#1a2035;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#3d7fff;--accent2:rgba(61,127,255,0.15);
  --up:#29d9a0;--up2:rgba(41,217,160,0.1);
  --dn:#f0587c;--dn2:rgba(240,88,124,0.1);
  --gold:#d4a84b;--muted:#5a6080;--muted2:#8890b0;--text:#dde1f0;
  --mono:'IBM Plex Mono',monospace;
}
.root{min-height:100vh;background:var(--bg0);position:relative;overflow-x:hidden}
.glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.g1{width:600px;height:400px;top:-100px;left:-100px;background:rgba(61,127,255,0.05)}
.g2{width:500px;height:350px;bottom:0;right:-80px;background:rgba(41,217,160,0.04)}

.hdr{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:rgba(8,11,18,0.92);backdrop-filter:blur(16px);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:32px;height:32px;border:1.5px solid var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);box-shadow:0 0 10px rgba(61,127,255,0.2)}
.logo-name{font-size:13px;font-weight:500;letter-spacing:0.04em}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:12px}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--up);background:var(--up2);border:1px solid rgba(41,217,160,0.25);padding:3px 9px;border-radius:20px;letter-spacing:0.1em}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--up);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.clk{font-family:var(--mono);font-size:10px;color:var(--muted)}

.api-wrap{margin:18px 20px 0;background:rgba(61,127,255,0.07);border:1px solid rgba(61,127,255,0.25);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.api-text{font-size:12px;color:var(--muted2);flex:1;min-width:180px;line-height:1.6}
.api-text a{color:var(--accent);text-decoration:none}
.api-text a:hover{text-decoration:underline}
.api-row{display:flex;gap:7px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.api-in{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:7px 11px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;width:230px;transition:border-color 0.2s}
.api-in:focus{border-color:var(--accent)}
.api-in::placeholder{color:var(--muted)}
.api-saved{font-family:var(--mono);font-size:11px;color:var(--up);white-space:nowrap}

.main{padding:20px;position:relative;z-index:1;max-width:1400px;margin:0 auto}

.add-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.inp-wrap{position:relative}
.ticker-in{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:9px 13px 9px 38px;font-family:var(--mono);font-size:13px;color:var(--text);outline:none;width:190px;letter-spacing:0.06em;transition:border-color 0.2s,box-shadow 0.2s}
.ticker-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,127,255,0.1)}
.ticker-in::placeholder{color:var(--muted);font-size:11px;letter-spacing:0}
.inp-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.btn{padding:9px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all 0.18s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#5590ff;box-shadow:0 0 16px rgba(61,127,255,0.3)}
.btn-p:disabled{opacity:0.4;cursor:not-allowed}
.btn-g{background:transparent;color:var(--muted2);border:1px solid var(--border2)}
.btn-g:hover{color:var(--text);background:var(--bg3)}
.btn-s{padding:6px 11px;font-size:11px;border-radius:6px}

.pre-row{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.pre-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em;margin-right:2px}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;background:transparent;border:1px solid var(--border2);color:var(--muted2);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}

.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cnt{font-family:var(--mono);font-size:11px;color:var(--muted)}
.cnt em{color:var(--muted2);font-style:normal}
.ref-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-family:var(--mono);font-size:10px;color:var(--muted2);cursor:pointer;transition:all 0.18s}
.ref-btn:hover{border-color:var(--accent);color:var(--accent)}
.ref-btn:disabled{opacity:0.4;cursor:not-allowed}
.spin{animation:rot 0.7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.tbl-card{background:var(--bg1);border:1px solid var(--border);border-radius:13px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{padding:12px 16px;text-align:right;font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.14em;font-weight:400;white-space:nowrap}
th:first-child,th:nth-child(2){text-align:left}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:14px 16px;font-size:12px;text-align:right;white-space:nowrap;vertical-align:middle}
td:first-child{text-align:left}
td:nth-child(2){text-align:left}

.cc{display:flex;flex-direction:column;gap:2px}
.cm{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);letter-spacing:0.04em}
.cmk{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em}
.nm{font-size:12px;color:var(--muted2);font-weight:300;max-width:140px;overflow:hidden;text-overflow:ellipsis;display:block}
.pv{font-family:var(--mono);font-size:15px;font-weight:600}
.chgc{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.ca{font-family:var(--mono);font-size:12px;font-weight:600}
.cp{font-family:var(--mono);font-size:10px;opacity:0.75}
.uc{color:var(--up)}.dc{color:var(--dn)}.nc{color:var(--muted2)}
.mt{font-family:var(--mono);font-size:11px;color:var(--muted2)}
.mg{font-family:var(--mono);font-size:11px;color:var(--gold)}
.na{font-family:var(--mono);font-size:10px;color:var(--muted)}
.del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;padding:3px 7px;border-radius:4px;line-height:1;transition:all 0.15s}
.del:hover{color:var(--dn);background:var(--dn2)}
.ldc{color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:0.08em}
.erc{color:var(--dn);font-family:var(--mono);font-size:10px}
.sp{display:inline-block;width:11px;height:11px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--accent);animation:rot 0.7s linear infinite;vertical-align:middle;margin-right:5px}

@keyframes fup{0%{background:var(--up2)}100%{background:transparent}}
@keyframes fdn{0%{background:var(--dn2)}100%{background:transparent}}
.fu{animation:fup 1.2s ease}.fd{animation:fdn 1.2s ease}

.empty{text-align:center;padding:60px 20px}
.ei{font-size:36px;opacity:0.2;margin-bottom:10px}
.et{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.08em}

.toast{position:fixed;bottom:24px;right:20px;z-index:999;background:var(--bg2);border:1px solid;border-radius:10px;padding:11px 16px;font-size:11px;font-family:var(--mono);animation:su 0.25s ease;max-width:340px;line-height:1.5}
.te{border-color:var(--dn);color:var(--dn)}.to{border-color:var(--up);color:var(--up)}
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

.foot{margin-top:14px;font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;line-height:1.8}

@media(max-width:860px){.hm{display:none}}
@media(max-width:580px){.hs{display:none} th,td{padding:10px 8px} .ticker-in{width:150px} .api-in{width:100%}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const FINNHUB = "https://finnhub.io/api/v1";
const LS_KEY  = "stk_apikey";
const LS_TICK = "stk_tickers";

const PRESETS = {
  nikkei:   [{code:"7203",name:"トヨタ自動車"},{code:"6758",name:"ソニーG"},{code:"9984",name:"ソフトバンクG"},{code:"6861",name:"キーエンス"},{code:"8306",name:"三菱UFJ"}],
  tech:     [{code:"6758",name:"ソニーG"},{code:"9984",name:"ソフトバンクG"},{code:"6367",name:"ダイキン工業"},{code:"6501",name:"日立製作所"},{code:"4755",name:"楽天G"}],
  bank:     [{code:"8306",name:"三菱UFJ"},{code:"8316",name:"三井住友FG"},{code:"8411",name:"みずほFG"}],
  dividend: [{code:"8058",name:"三菱商事"},{code:"9432",name:"NTT"},{code:"4502",name:"武田薬品"},{code:"8309",name:"三井住友T"},{code:"2914",name:"JT"}],
};
const PLB = {nikkei:"日経主要",tech:"国内テック",bank:"メガバンク",dividend:"高配当"};

const lsGet = (k,fb) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb} };
const lsSet = (k,v)  => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };
const fmt    = (v,d=2)=> v==null||isNaN(v)?null:Number(v).toLocaleString("ja-JP",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtInt = v      => v==null||isNaN(v)?null:Math.round(v).toLocaleString("ja-JP");

async function fetchStock(code, apiKey) {
  const sym = `TYO:${code}`;
  const tk  = `&token=${apiKey}`;
  const [qR,mR,pR] = await Promise.all([
    fetch(`${FINNHUB}/quote?symbol=${sym}${tk}`),
    fetch(`${FINNHUB}/stock/metric?symbol=${sym}&metric=all${tk}`),
    fetch(`${FINNHUB}/stock/profile2?symbol=${sym}${tk}`),
  ]);
  if (!qR.ok) throw new Error(`HTTP ${qR.status}`);
  const q = await qR.json();
  const m = mR.ok ? (await mR.json()).metric || {} : {};
  const p = pR.ok ? await pR.json() : {};
  if (!q.c || q.c === 0) throw new Error("データなし（コードを確認）");
  const eps = m.epsBasicExclExtraItemsTTM ?? m.epsTTM ?? null;
  const div = m.dividendsPerShareAnnual ?? null;
  return {
    code, name: p.name || code,
    price: q.c, change: q.d ?? (q.c-q.pc),
    changePct: q.dp ?? ((q.c-q.pc)/q.pc*100),
    per: m.peBasicExclExtraTTM ?? m.peTTM ?? null,
    pbr: m.pbAnnual ?? null, eps, divPerShare: div,
    divYield: m.dividendYieldIndicatedAnnual ?? null,
    payoutRatio: (div&&eps&&eps!==0) ? div/eps*100 : (m.payoutRatioAnnual??null),
  };
}

function M({v, gold=false, cls=""}) {
  return <td className={cls}>{v==null?<span className="na">—</span>:<span className={gold?"mg":"mt"}>{v}</span>}</td>;
}

function App() {
  const [apiKey, setApiKey] = useState(()=>lsGet(LS_KEY,""));
  const [apiIn,  setApiIn]  = useState(()=>lsGet(LS_KEY,""));
  const [rows,   setRows]   = useState([]);
  const [tickIn, setTickIn] = useState("");
  const [busy,   setBusy]   = useState(false);
  const [toast,  setToast]  = useState(null);
  const [clock,  setClock]  = useState("");
  const flashMap = useRef({});
  const toastTmr = useRef(null);

  useEffect(()=>{
    const t=()=>setClock(new Date().toLocaleTimeString("ja-JP"));
    t(); const id=setInterval(t,1000); return()=>clearInterval(id);
  },[]);

  const showMsg = useCallback((text,type="err")=>{
    if(toastTmr.current) clearTimeout(toastTmr.current);
    setToast({text,type});
    toastTmr.current=setTimeout(()=>setToast(null),4000);
  },[]);

  const applyResults = useCallback((codes, results, setFn)=>{
    setFn(prev=>prev.map((r,_)=>{
      const i=codes.indexOf(r.code);
      if(i<0) return r;
      const res=results[i];
      if(res.status==="fulfilled"){
        const d=res.value;
        const old=r.data?.price;
        if(old!=null&&d.price!=null&&old!==d.price){
          flashMap.current[r.code]=d.price>old?"fu":"fd";
          setTimeout(()=>{flashMap.current[r.code]=null;setFn(x=>[...x]);},1300);
        }
        return {...r,data:d,name:d.name,loading:false,error:null};
      }
      return {...r,loading:false,error:results[i].reason?.message??"取得失敗"};
    }));
  },[]);

  // Restore saved tickers on mount
  useEffect(()=>{
    const saved=lsGet(LS_TICK,[]);
    const key=lsGet(LS_KEY,"");
    if(!saved.length) return;
    const init=saved.map(t=>({code:t.code,name:t.name||t.code,data:null,loading:!!key,error:null}));
    setRows(init);
    if(key){
      Promise.allSettled(saved.map(t=>fetchStock(t.code,key)))
        .then(results=>applyResults(saved.map(t=>t.code),results,setRows));
    }
  },[applyResults]);

  // 60s auto-refresh
  useEffect(()=>{
    const id=setInterval(()=>{
      setRows(prev=>{
        if(!prev.length||!apiKey) return prev;
        const codes=prev.map(r=>r.code);
        setRows(r=>r.map(x=>({...x,loading:true})));
        Promise.allSettled(codes.map(c=>fetchStock(c,apiKey)))
          .then(res=>applyResults(codes,res,setRows));
        return prev;
      });
    },60000);
    return()=>clearInterval(id);
  },[apiKey,applyResults]);

  const saveKey = ()=>{
    const k=apiIn.trim();
    if(!k){showMsg("APIキーを入力してください");return;}
    setApiKey(k); lsSet(LS_KEY,k);
    showMsg("APIキーを保存しました ✓","ok");
    setRows(prev=>{
      if(!prev.length) return prev;
      const codes=prev.map(r=>r.code);
      const next=prev.map(r=>({...r,loading:true,error:null}));
      Promise.allSettled(codes.map(c=>fetchStock(c,k)))
        .then(res=>applyResults(codes,res,setRows));
      return next;
    });
  };

  const addStock = async()=>{
    const code=tickIn.trim().replace(/\D/g,"");
    if(!code) return;
    if(!apiKey){showMsg("先にAPIキーを保存してください");return;}
    if(rows.find(r=>r.code===code)){showMsg(`${code} は追加済みです`);return;}
    setTickIn("");
    const nr={code,name:code,data:null,loading:true,error:null};
    setRows(prev=>{const n=[...prev,nr];lsSet(LS_TICK,n.map(r=>({code:r.code,name:r.name})));return n;});
    try{
      const d=await fetchStock(code,apiKey);
      setRows(prev=>{const n=prev.map(r=>r.code===code?{...r,data:d,name:d.name,loading:false}:r);lsSet(LS_TICK,n.map(r=>({code:r.code,name:r.name})));return n;});
    }catch(e){
      setRows(prev=>prev.map(r=>r.code===code?{...r,loading:false,error:e.message}:r));
      showMsg(`${code}: ${e.message}`);
    }
  };

  const remove = code=>{
    setRows(prev=>{const n=prev.filter(r=>r.code!==code);lsSet(LS_TICK,n.map(r=>({code:r.code,name:r.name})));return n;});
  };

  const clearAll = ()=>{setRows([]);lsSet(LS_TICK,[]);};

  const loadPreset = key=>{
    if(!apiKey){showMsg("先にAPIキーを保存してください");return;}
    setRows(prev=>{
      const ex=prev.map(r=>r.code);
      const add=PRESETS[key].filter(p=>!ex.includes(p.code));
      if(!add.length){showMsg("既に全銘柄が追加されています");return prev;}
      const newRows=add.map(p=>({code:p.code,name:p.name,data:null,loading:true,error:null}));
      const next=[...prev,...newRows];
      lsSet(LS_TICK,next.map(r=>({code:r.code,name:r.name})));
      const codes=add.map(p=>p.code);
      Promise.allSettled(codes.map(c=>fetchStock(c,apiKey)))
        .then(res=>applyResults(codes,res,setRows));
      return next;
    });
  };

  const refresh = async()=>{
    if(!rows.length||!apiKey||busy) return;
    setBusy(true);
    const codes=rows.map(r=>r.code);
    setRows(prev=>prev.map(r=>({...r,loading:true})));
    const res=await Promise.allSettled(codes.map(c=>fetchStock(c,apiKey)));
    applyResults(codes,res,setRows);
    setTimeout(()=>setBusy(false),800);
  };

  return (
    <div className="root">
      <div className="glow g1"/><div className="glow g2"/>
      <header className="hdr">
        <div className="logo">
          <div className="logo-box">株</div>
          <div>
            <div className="logo-name">株式ダッシュボード</div>
            <div className="logo-sub">JAPAN EQUITY MONITOR</div>
          </div>
        </div>
        <div className="hdr-r">
          <div className="live"><div className="ldot"/>LIVE</div>
          <div className="clk">{clock}</div>
        </div>
      </header>

      {/* API key */}
      <div className="api-wrap">
        <div style={{fontSize:15}}>🔑</div>
        <div className="api-text">
          <a href="https://finnhub.io" target="_blank" rel="noreferrer">finnhub.io</a> の無料APIキーを入力してください。
          キーはこのブラウザにのみ保存され、外部サーバーへは送信されません。
          スマホなど別デバイスでも初回だけ入力すれば保存されます。
        </div>
        <div className="api-row">
          {apiKey && <span className="api-saved">✓ 保存済み</span>}
          <input className="api-in" type="password" placeholder="APIキーを貼り付けてEnter or 保存"
            value={apiIn} onChange={e=>setApiIn(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&saveKey()} />
          <button className="btn btn-p btn-s" onClick={saveKey}>保存</button>
        </div>
      </div>

      <div className="main">
        <div className="add-bar">
          <div className="inp-wrap">
            <span className="inp-ico">🔍</span>
            <input className="ticker-in" type="text" placeholder="証券コード（例: 7203）"
              maxLength={5} value={tickIn}
              onChange={e=>setTickIn(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addStock()} />
          </div>
          <button className="btn btn-p" onClick={addStock} disabled={!apiKey}>追加</button>
          <button className="btn btn-g" onClick={clearAll}>クリア</button>
        </div>

        <div className="pre-row">
          <span className="pre-lbl">プリセット</span>
          {Object.keys(PLB).map(k=>(
            <button key={k} className="chip" onClick={()=>loadPreset(k)}>{PLB[k]}</button>
          ))}
        </div>

        <div className="ctrl-row">
          <div className="cnt"><em>{rows.length}</em> 銘柄</div>
          <button className="ref-btn" onClick={refresh} disabled={busy||!rows.length}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={busy?"spin":""}>
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/>
            </svg>
            {busy?"更新中...":"更新"}
          </button>
        </div>

        <div className="tbl-card">
          <table>
            <thead>
              <tr>
                <th>コード</th><th>銘柄名</th><th>株価</th><th>前日比</th>
                <th className="hs">PER</th><th className="hs">PBR</th>
                <th className="hm">EPS</th><th className="hm">配当/株</th>
                <th className="hm">配当利回り</th><th className="hm">配当性向</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0?(
                <tr><td colSpan={11}>
                  <div className="empty">
                    <div className="ei">📊</div>
                    <div className="et">証券コードを入力して銘柄を追加してください</div>
                  </div>
                </td></tr>
              ):rows.map(r=>{
                const fl=flashMap.current[r.code]||"";
                if(r.loading) return(
                  <tr key={r.code} className={fl}>
                    <td><div className="cc"><span className="cm">{r.code}</span><span className="cmk">東証</span></div></td>
                    <td><span className="nm">{r.name}</span></td>
                    <td colSpan={8} className="ldc"><span className="sp"/>取得中...</td>
                    <td><button className="del" onClick={()=>remove(r.code)}>×</button></td>
                  </tr>
                );
                if(r.error) return(
                  <tr key={r.code}>
                    <td><div className="cc"><span className="cm">{r.code}</span><span className="cmk">東証</span></div></td>
                    <td><span className="nm">{r.name}</span></td>
                    <td colSpan={8} className="erc">⚠ {r.error}</td>
                    <td><button className="del" onClick={()=>remove(r.code)}>×</button></td>
                  </tr>
                );
                const d=r.data;
                const cc=d.change>0?"uc":d.change<0?"dc":"nc";
                const sg=d.change>=0?"+":"";
                return(
                  <tr key={r.code} className={fl}>
                    <td><div className="cc"><span className="cm">{d.code}</span><span className="cmk">東証</span></div></td>
                    <td><span className="nm" title={d.name}>{d.name}</span></td>
                    <td><span className={"pv "+cc}>¥{fmtInt(d.price)??"—"}</span></td>
                    <td><div className={"chgc "+cc}><span className="ca">{sg}{fmtInt(d.change)??"—"}</span><span className="cp">{sg}{fmt(d.changePct)??"—"}%</span></div></td>
                    <M v={d.per!=null?fmt(d.per)+"×":null} cls="hs"/>
                    <M v={d.pbr!=null?fmt(d.pbr)+"×":null} cls="hs"/>
                    <M v={d.eps!=null?"¥"+fmt(d.eps):null} cls="hm"/>
                    <M v={d.divPerShare!=null?"¥"+fmt(d.divPerShare):null} gold cls="hm"/>
                    <M v={d.divYield!=null?fmt(d.divYield)+"%":null} gold cls="hm"/>
                    <M v={d.payoutRatio!=null?fmt(d.payoutRatio,1)+"%":null} cls="hm"/>
                    <td><button className="del" onClick={()=>remove(r.code)}>×</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div className="foot">
          データ提供: Finnhub（準リアルタイム） · 60秒ごと自動更新 · APIキーはこのデバイスのみ保存（外部送信なし）<br/>
          投資判断には必ず公式情報をご確認ください
        </div>
      </div>

      {toast&&<div className={"toast "+(toast.type==="ok"?"to":"te")}>{toast.text}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
